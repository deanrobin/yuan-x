spring:
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:mysql://43.134.118.142:33066/yuan-x?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:arb}
    password: ${DB_PASSWORD}   # 在 application-local.yml 中配置
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

server:
  port: 8080

logging:
  level:
    com.deanrobin.yx: INFO

# ==============================
# X (Twitter) API
# 敏感 Key 在 application-local.yml 中配置
# ==============================
x:
  api:
    poll-interval-seconds: 900   # 推文轮询间隔（秒），默认 15 分钟

# ==============================
# twitterapi.io（第三方推文 API）
# api-key 在 application-local.yml 中配置
# ==============================
twitterapiio:
  api-key: ${TWITTER_API_IO_KEY:}

# ==============================
# 通知渠道配置
# ==============================
notify:
  lark:
    enabled: true
    webhook-url: "https://open.feishu.cn/open-apis/bot/v2/hook/5581e5bb-b771-43eb-94a4-9ca756f7c7e8"
    sign-secret: ""

  telegram:
    enabled: false
    bot-token: ""
    chat-id: ""

  qq:
    enabled: false
    webhook-url: ""
