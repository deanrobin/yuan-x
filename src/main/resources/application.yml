spring:
  datasource:
    url: jdbc:mysql://localhost:3306/yx_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8080

logging:
  level:
    com.deanrobin.yx: INFO

# ==============================
# X (Twitter) API 配置
# 敏感信息从环境变量读取，不写死在配置文件中
# ==============================
x:
  api:
    api-key: ${X_API_KEY}
    api-secret: ${X_API_SECRET}
    poll-interval-seconds: 120   # 轮询间隔（秒），默认 2 分钟

  # 监控账户名单
  accounts:
    - handle: "elonmusk"
      name: "Elon Musk"
      enabled: true
    - handle: "sama"
      name: "Sam Altman"
      enabled: true

# ==============================
# 通知渠道配置
# ==============================
notify:
  # Lark (飞书) Webhook —— 默认开启
  lark:
    enabled: true
    webhook-url: "https://open.feishu.cn/open-apis/bot/v2/hook/5581e5bb-b771-43eb-94a4-9ca756f7c7e8"
    sign-secret: ""   # 飞书机器人安全设置 → 签名校验密钥，不启用则留空

  # Telegram Bot
  telegram:
    enabled: false
    bot-token: "your_tg_bot_token"
    chat-id: "your_chat_id"

  # QQ 群机器人
  qq:
    enabled: false
    webhook-url: "http://your_qq_bot_webhook"
